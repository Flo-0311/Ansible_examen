
- name: Install PHP packages
  become: true
  apt:
    name: "{{ php_packages }}"
    state: present

# PHP version readout
- name: Find PHP-FPM socket
  shell: echo "/run/php/php8.3-fpm.sock" | grep -oP 'php\K[0-9]+\.[0-9]+'
  register: php_version


- name: Ensure PHP-FPM is running
  become: true
  shell: |
    systemctl enable php{{ php_version.stdout }}-fpm
    systemctl start php{{ php_version.stdout }}-fpm

- name: Set PHP memory_limit
  become: true
  lineinfile:
    path: /etc/php/{{ php_version.stdout }}/fpm/php.ini
    regexp: '^memory_limit'
    line: "memory_limit = {{ php_memory_limit }}"
  notify: restart php-fpm

- name: Set PHP max_execution_time
  become: true
  lineinfile:
    path: /etc/php/{{ php_version.stdout }}/fpm/php.ini
    regexp: '^max_execution_time'
    line: "max_execution_time = {{ php_max_execution_time }}"
  notify: restart php-fpm

- name: Set PHP upload_max_filesize
  become: true
  lineinfile:
    path: /etc/php/{{ php_version.stdout }}/fpm/php.ini
    regexp: '^upload_max_filesize'
    line: "upload_max_filesize = {{ php_upload_max_filesize }}"
  notify: restart php-fpm