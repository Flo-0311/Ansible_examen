---
# Variable setup.
- name: Include OS-specific variables.
  include_vars: "{{ ansible_facts.os_family }}.yml"

- name: Define nginx_user.
  set_fact:
    nginx_user: "{{ __nginx_user }}"
  when: nginx_user is not defined

# Setup/install tasks.
- include_tasks: setup-RedHat.yml
  when: ansible_facts.os_family == 'RedHat' or ansible_facts.os_family == 'Rocky' or ansible_facts.os_family == 'AlmaLinux'

- include_tasks: setup-Ubuntu.yml
  when: ansible_facts.distribution == 'Ubuntu'

- include_tasks: setup-Debian.yml
  when: ansible_facts.os_family == 'Debian'

- include_tasks: setup-FreeBSD.yml
  when: ansible_facts.os_family == 'FreeBSD'

- include_tasks: setup-OpenBSD.yml
  when: ansible_facts.os_family == 'OpenBSD'

- include_tasks: setup-Archlinux.yml
  when: ansible_facts.os_family == 'Archlinux'

- include_tasks: setup-Suse.yml
  when: ansible_facts.os_family == 'Suse'

#Creating var/www for magento
- name: Create /var/www/html
  file:
    path: /var/www/html
    state: directory

#php version readout
- name: Find PHP-FPM socket
  shell: ls /run/php/php[0-9]*-fpm.sock
  register: php_sockets
  when: php_enable_webserver | default(false)

#configure vhost if php is installed
- import_tasks: vhosts.yml
  when: php_enable_webserver | default(false)

# Nginx setup.
- name: Copy nginx configuration in place.
  template:
    src: "{{ nginx_conf_template }}"
    dest: "{{ nginx_conf_file_path }}"
    owner: root
    group: "{{ root_group }}"
    mode: 0644
    validate: nginx -t -c %s
  notify:
    - reload nginx

- name: Ensure nginx service is running as configured.
  service:
    name: nginx
    state: "{{ nginx_service_state }}"
    enabled: "{{ nginx_service_enabled }}"
