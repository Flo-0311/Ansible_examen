
php_memory_limit: "2G"
php_max_execution_time: "1800"
php_upload_max_filesize: "256M"
php_post_max_size: "256M"
php_max_input_vars: "5000"

php_packages:
  - php
  - php-cli
  - php-common
  - php-fpm
  - php-opcache
  - php-dev

  # Core Extensions für Magento
  - php-gd
  - php-mbstring
  - php-xml
  - php-zip
  - php-intl
  - php-curl
  - php-soap
  - php-bcmath
  - php-mysql

  # Performance / Cache
  - php-apcu