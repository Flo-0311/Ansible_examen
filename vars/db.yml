mysql_root_password: root_password #rootpasswort
mysql_databases:
  - name: magento #ansible erstellt eine datenbank mit den Namen DB
    encoding: latin1 #Zeichenkodierung - bestimt wie Text gespeicher wird
    collation: latin1_general_ci #sortier und vergleichsregel
mysql_users:
  - name: user #Datenbank user Name
    host: "%" #Jeder hat Zugriff
    password: password #Datenbank passwort
    priv: "magento.*:ALL" #Alle Reche sind den nutzer zugewisen SELECT DELETE INSERT UPDATE